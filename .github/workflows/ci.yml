name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Type-check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: docs/RULES.md is in sync with src/rule-docs.ts
        run: npm run docs:check

      - name: schema.json is in sync with RulesConfig
        run: npm run schema:check

  self-test:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install + build
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Must-pass on valid fixtures
        run: |
          node dist/cli.js tests/fixtures/valid-stdio.json tests/fixtures/valid-http.json
          node dist/cli.js tests/fixtures/zed-settings.json
          node dist/cli.js tests/fixtures/claude-desktop-jsonc.json

      - name: Must-fail on broken fixture
        run: |
          set +e
          node dist/cli.js tests/fixtures/broken.json
          code=$?
          if [ $code -eq 0 ]; then
            echo "Expected non-zero exit on broken.json, got $code"
            exit 1
          fi

      - name: --list-rules and --explain work
        run: |
          node dist/cli.js --list-rules | grep -q dangerous-command
          node dist/cli.js --explain hardcoded-secret | grep -q 'default:'

      - name: init writes config + workflow in a clean dir
        run: |
          mkdir -p /tmp/init-check && cd /tmp/init-check
          node $GITHUB_WORKSPACE/dist/cli.js init
          test -f mcpcheck.config.json
          test -f .github/workflows/mcpcheck.yml
          # Re-running without --force must exit 1.
          set +e
          node $GITHUB_WORKSPACE/dist/cli.js init
          if [ $? -ne 1 ]; then
            echo "Expected init to exit 1 on existing files without --force"
            exit 1
          fi

  vscode-extension:
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:
      run:
        working-directory: extensions/vscode
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root + build mcpcheck (extension depends on file:../..)
        working-directory: .
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Install extension deps
        run: npm install --no-audit --no-fund

      - name: Type-check
        run: npm run lint

      - name: Build extension bundle
        run: npm run build

      - name: Smoke-load the bundle
        run: |
          node -e "
          const Module = require('module');
          const orig = Module.prototype.require;
          Module.prototype.require = function(p) {
            if (p === 'vscode') return {};
            return orig.apply(this, arguments);
          };
          const mod = require('./out/extension.cjs');
          if (typeof mod.activate !== 'function') {
            console.error('activate not exported');
            process.exit(1);
          }
          if (typeof mod.deactivate !== 'function') {
            console.error('deactivate not exported');
            process.exit(1);
          }
          "

      - name: Package VSIX
        run: npx --yes @vscode/vsce@^3 package --no-dependencies --no-git-tag-version

      - name: VSIX contains extension.cjs and bundled JSON schema
        run: |
          VSIX=$(ls *.vsix | head -1)
          unzip -l "$VSIX" | grep -q 'extension/out/extension.cjs'
          unzip -l "$VSIX" | grep -q 'extension/schema/mcpcheck.schema.json'

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcpcheck-vscode-vsix
          path: extensions/vscode/*.vsix
          if-no-files-found: error

  playground:
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:
      run:
        working-directory: playground
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install + build mcpcheck core (playground depends on file:..)
        working-directory: .
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Install playground deps
        run: npm install --no-audit --no-fund

      - name: Type-check
        run: npm run lint

      - name: Build static site
        run: npm run build

      - name: Assert rules are in the bundle
        run: |
          for id in hardcoded-secret dangerous-command unstable-reference context_servers; do
            if ! grep -q "$id" dist/app.js; then
              echo "Missing $id in browser bundle"
              exit 1
            fi
          done

      - name: schema.json is served by the playground
        run: test -f dist/schema.json

      - name: Upload playground artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcpcheck-playground
          path: playground/dist
          if-no-files-found: error
