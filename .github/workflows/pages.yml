name: Deploy playground to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "playground/**"
      - "src/**"
      - "package.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # The playground depends on mcpcheck via `file:..`, so the root has to
      # install and build first — that's what produces dist/browser.js, which
      # the playground's esbuild reads through the `./browser` subpath export.
      - name: Install + build mcpcheck core
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Install + build playground
        working-directory: playground
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: playground/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
