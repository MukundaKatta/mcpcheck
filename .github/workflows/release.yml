name: Release on tag

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install + build + test
        run: |
          npm install --no-audit --no-fund
          npm run build
          npm test

      - name: Extract CHANGELOG entry for this tag
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Strip leading "v" from tag to match a "## [1.2.3]" heading.
          VER="${TAG#v}"
          # Print everything between the first "## [$VER]" and the next "## [".
          awk -v ver="## [$VER]" '
            $0 ~ ver, /^## \[/ { if ($0 ~ ver) { found=1; next } if (found && /^## \[/) exit; if (found) print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "(No CHANGELOG entry found for $TAG; using auto-notes.)" > RELEASE_NOTES.md
          fi
          echo "body_path=RELEASE_NOTES.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file "${{ steps.notes.outputs.body_path }}" \
            --verify-tag
