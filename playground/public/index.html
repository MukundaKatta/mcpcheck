<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>mcpcheck — paste a config, see issues live</title>
    <meta
      name="description"
      content="Paste an MCP (Model Context Protocol) config for Claude Desktop, Claude Code, Cursor, Cline, Windsurf, or Zed — mcpcheck flags hardcoded secrets, missing transports, unpinned packages, dangerous commands, and more, entirely in your browser."
    />
    <meta name="theme-color" content="#0d1017" />
    <meta name="color-scheme" content="dark light" />
    <link rel="canonical" href="https://mukundakatta.github.io/mcpcheck/" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2064%2064%22%3E%3Crect%20width%3D%2264%22%20height%3D%2264%22%20rx%3D%2212%22%20fill%3D%22%230d1017%22%2F%3E%3Cpath%20d%3D%22M18%2036%20l9%209%20l19-19%22%20stroke%3D%22%237dd3fc%22%20stroke-width%3D%225%22%20fill%3D%22none%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%2F%3E%3C%2Fsvg%3E"
      type="image/svg+xml"
    />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="mcpcheck — paste an MCP config, see issues live" />
    <meta
      property="og:description"
      content="Lint MCP configs for Claude Desktop, Cursor, Cline, Windsurf, and Zed. Catches hardcoded secrets, dangerous commands, unpinned packages. 100% client-side."
    />
    <meta property="og:url" content="https://mukundakatta.github.io/mcpcheck/" />
    <meta property="og:site_name" content="mcpcheck" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="mcpcheck — MCP config linter" />
    <meta
      name="twitter:description"
      content="Paste an MCP config, see diagnostics and Quick Fixes live, entirely in your browser."
    />

    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      <h1>mcpcheck</h1>
      <p class="tagline">
        Paste an MCP config. See issues live. Nothing leaves your browser.
      </p>
      <nav>
        <a href="https://github.com/MukundaKatta/mcpcheck">GitHub</a>
        <a href="https://github.com/MukundaKatta/mcpcheck/blob/main/docs/RULES.md">Rules</a>
        <a href="https://github.com/MukundaKatta/mcpcheck#readme">CLI</a>
        <a href="https://github.com/MukundaKatta/mcpcheck/tree/main/extensions/vscode">VS Code</a>
      </nav>
    </header>

    <main>
      <section class="editor">
        <div class="toolbar">
          <label for="filename">File name</label>
          <input id="filename" type="text" value="claude_desktop_config.json" />
          <button id="sample" type="button">Load sample</button>
          <button id="fix" type="button" title="Apply every autofix in place">
            Fix all
          </button>
        </div>
        <textarea
          id="input"
          spellcheck="false"
          autocapitalize="off"
          autocomplete="off"
          autocorrect="off"
          aria-label="MCP config source"
        ></textarea>
      </section>

      <section class="results" aria-live="polite">
        <div class="summary" id="summary">Start typing to see diagnostics…</div>
        <ol id="issues" class="issues"></ol>
      </section>
    </main>

    <footer>
      <p>
        100% client-side. Your config is never sent anywhere. Same engine as
        the CLI, GitHub Action, and VS Code extension.
      </p>
    </footer>

    <dialog id="explain-dialog">
      <h2 id="explain-title"></h2>
      <pre id="explain-body"></pre>
      <form method="dialog"><button>Close</button></form>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
