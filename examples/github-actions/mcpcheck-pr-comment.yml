# Drop this file at `.github/workflows/mcpcheck-pr-comment.yml` in your repo
# to get a PR comment with an mcpcheck report on every MCP-config change.
#
# Uses the Docker image (no npm install needed on the runner). The job:
#   1. Runs mcpcheck in markdown mode against every changed MCP config.
#   2. Posts (or updates) a single PR comment with the rendered report.
name: mcpcheck PR comment

on:
  pull_request:
    paths:
      - '**/mcp.json'
      - '**/.mcp.json'
      - '**/claude_desktop_config.json'
      - '**/.cursor/mcp.json'
      - '**/.codeium/windsurf/mcp_config.json'
      - 'mcpcheck.config.json'

permissions:
  contents: read
  pull-requests: write

jobs:
  mcpcheck-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run mcpcheck (Markdown report)
        id: lint
        run: |
          docker run --rm -v "$PWD:/work" -w /work \
            ghcr.io/mukundakatta/mcpcheck \
            '**/mcp.json' '**/.mcp.json' '**/claude_desktop_config.json' \
            --format markdown --fail-on never > mcpcheck-report.md
          # Stash for downstream step; also print to job log.
          echo "report_path=mcpcheck-report.md" >> "$GITHUB_OUTPUT"
          cat mcpcheck-report.md

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('${{ steps.lint.outputs.report_path }}', 'utf8');
            const marker = '<!-- mcpcheck-report -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body?.startsWith(marker));
            const finalBody = `${marker}\n${body}`;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: finalBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: finalBody,
              });
            }
